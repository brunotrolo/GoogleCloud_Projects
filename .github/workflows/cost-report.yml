name: Painel de Custos GCP

# Roda a cada 3 horas (tempo quase real via Cloud Monitoring) e sob demanda.
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      dias:
        description: "Janela de análise em dias"
        required: false
        default: "14"

permissions:
  contents: write
  id-token: write

jobs:
  painel:
    runs-on: ubuntu-latest
    env:
      HAS_WIF: ${{ secrets.GCP_WIF_PROVIDER != '' }}
      HAS_KEY: ${{ secrets.GCP_SA_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP (WIF)
        if: env.HAS_WIF == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Auth GCP (chave JSON)
        if: env.HAS_WIF != 'true' && env.HAS_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install --quiet google-cloud-monitoring

      - name: Gerar painel (Cloud Monitoring — tempo quase real)
        env:
          DIAS: ${{ github.event.inputs.dias || '14' }}
        run: python3 scripts/gerar_monitoring.py

      - name: Commitar painel
        run: |
          git config user.name  "cost-bot"
          git config user.email "actions@github.com"
          git add docs/data/costs.json
          if git diff --cached --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "chore: atualiza painel de custos $(date -u +'%F %H:%M')"
            git push
          fi
